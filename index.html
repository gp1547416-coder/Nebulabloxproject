<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Nebula Blox Web</title>
    <script type="importmap">
      {
        "imports": {
          "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
          "@google/generative-ai": "https://esm.run/@google/generative-ai"
        }
      }
    </script>
    <style>
        body { margin: 0; overflow: hidden; font-family: 'Segoe UI', sans-serif; background: #111; }
        #ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; }
        
        /* Roblox-style Chat */
        #chat-box { 
            position: absolute; top: 20px; left: 20px; width: 280px; 
            background: rgba(0,0,0,0.6); border-radius: 10px; padding: 15px;
            color: white; pointer-events: auto; backdrop-filter: blur(5px);
        }
        #ai-name { color: #00ffff; font-size: 10px; font-weight: bold; margin-bottom: 5px; }
        #ai-text { font-size: 14px; line-height: 1.4; }

        /* Input Area */
        #input-container {
            position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
            width: 90%; max-width: 500px; display: flex; gap: 10px; pointer-events: auto;
        }
        input { 
            flex: 1; padding: 12px; border-radius: 20px; border: none; 
            background: rgba(255,255,255,0.1); color: white; outline: none;
        }
        button { 
            background: #00ffff; border: none; padding: 10px 20px; 
            border-radius: 20px; font-weight: bold; cursor: pointer; 
        }

        /* Virtual Joystick */
        #joystick-wrapper {
            position: absolute; bottom: 40px; left: 40px; width: 100px; height: 100px;
            background: rgba(255,255,255,0.1); border-radius: 50%; pointer-events: auto;
        }
        #joystick-knob {
            position: absolute; top: 25px; left: 25px; width: 50px; height: 50px;
            background: white; border-radius: 50%;
        }
    </style>
</head>
<body>
    <div id="ui-layer">
        <div id="chat-box">
            <div id="ai-name">GNEBULABLOX AI</div>
            <div id="ai-text">Welcome to the Web Edition! Ask me anything.</div>
        </div>

        <div id="input-container">
            <input type="text" id="user-input" placeholder="Chat with AI...">
            <button onclick="askAI()">SEND</button>
        </div>

        <div id="joystick-wrapper"><div id="joystick-knob"></div></div>
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { GoogleGenerativeAI } from "@google/generative-ai";

        // --- 3D SCENE SETUP ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x222222);
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // Lights
        const light = new THREE.DirectionalLight(0xffffff, 1);
        light.position.set(5, 10, 7.5);
        scene.add(light);
        scene.add(new THREE.AmbientLight(0x404040));

        // Floor (The Baseplate)
        const grid = new THREE.GridHelper(100, 100, 0x444444, 0x222222);
        scene.add(grid);

        // Player (The Nebula Character)
        const group = new THREE.Group();
        const torso = new THREE.Mesh(new THREE.BoxGeometry(1, 1.2, 0.5), new THREE.MeshStandardMaterial({ color: 0x0077ff }));
        const head = new THREE.Mesh(new THREE.SphereGeometry(0.4), new THREE.MeshStandardMaterial({ color: 0xffdbac }));
        head.position.y = 1;
        const lLeg = new THREE.Mesh(new THREE.BoxGeometry(0.4, 0.8, 0.4), new THREE.MeshStandardMaterial({ color: 0x111111 }));
        const rLeg = new THREE.Mesh(new THREE.BoxGeometry(0.4, 0.8, 0.4), new THREE.MeshStandardMaterial({ color: 0x111111 }));
        lLeg.position.set(-0.25, -1, 0); rLeg.position.set(0.25, -1, 0);
        group.add(torso, head, lLeg, rLeg);
        group.position.y = 1.5;
        scene.add(group);

        camera.position.set(0, 5, 10);
        camera.lookAt(group.position);

        // --- AI LOGIC ---
        const API_KEY = "AIzaSyAgSd5IVtW92TfS3sdb7k8Nc8o362t5a-M";
        const genAI = new GoogleGenerativeAI(API_KEY);

        window.askAI = async () => {
            const input = document.getElementById('user-input');
            const aiDisplay = document.getElementById('ai-text');
            if (!input.value) return;

            const prompt = input.value;
            input.value = "";
            aiDisplay.innerText = "Thinking...";

            try {
                const model = genAI.getGenerativeModel({ model: "gemini-1.5-flash" });
                const result = await model.generateContent("You are GNebulaBlox. Keep it short: " + prompt);
                aiDisplay.innerText = result.response.text();
            } catch (e) {
                aiDisplay.innerText = "Error connecting to Nebula Servers.";
            }
        };

        // --- MOVEMENT ---
        let move = { x: 0, z: 0 };
        function animate() {
            requestAnimationFrame(animate);
            group.position.x += move.x;
            group.position.z += move.z;
            
            // Basic Leg Animation
            if(move.x !== 0 || move.z !== 0) {
                const time = Date.now() * 0.01;
                lLeg.rotation.x = Math.sin(time) * 0.5;
                rLeg.rotation.x = -Math.sin(time) * 0.5;
            }
            
            camera.position.x = group.position.x;
            camera.position.z = group.position.z + 10;
            renderer.render(scene, camera);
        }
        animate();

        // Keyboard Controls
        window.addEventListener('keydown', (e) => {
            if(e.key === 'w') move.z = -0.1;
            if(e.key === 's') move.z = 0.1;
            if(e.key === 'a') move.x = -0.1;
            if(e.key === 'd') move.x = 0.1;
        });
        window.addEventListener('keyup', () => move = {x:0, z:0});
    </script>
</body>
</html>
