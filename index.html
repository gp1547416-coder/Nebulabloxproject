<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nebula Search | Live</title>
    <style>
        :root { --accent: #00ffff; --bg: #050505; }
        body { background: var(--bg); color: white; font-family: 'Segoe UI', system-ui, sans-serif; margin: 0; display: flex; flex-direction: column; align-items: center; }
        
        /* Header */
        .nav { width: 100%; padding: 20px; display: flex; justify-content: center; }
        .logo { font-size: 24px; font-weight: 900; letter-spacing: -1px; }
        .logo span { color: var(--accent); }

        /* Search Bar */
        .search-area { margin-top: 50px; width: 90%; max-width: 600px; position: relative; }
        input { 
            width: 100%; padding: 16px 25px; border-radius: 30px; border: 1px solid #333; 
            background: #111; color: white; font-size: 16px; outline: none; transition: 0.2s;
        }
        input:focus { border-color: var(--accent); box-shadow: 0 0 15px rgba(0,255,255,0.1); }
        
        /* Results */
        #results-list { width: 90%; max-width: 700px; margin-top: 40px; padding-bottom: 50px; }
        .item { background: #0f0f0f; padding: 20px; border-radius: 12px; margin-bottom: 15px; transition: 0.2s; border: 1px solid #1a1a1a; }
        .item:hover { border-color: var(--accent); background: #151515; }
        .item a { color: var(--accent); font-size: 18px; text-decoration: none; font-weight: bold; display: block; }
        .item cite { color: #555; font-style: normal; font-size: 12px; margin-bottom: 5px; display: block; }
        .item p { color: #bbb; font-size: 14px; margin-top: 8px; line-height: 1.5; }
    </style>
</head>
<body>

    <div class="nav"><div class="logo">NEBULA<span>SEARCH</span></div></div>

    <div class="search-area">
        <input type="text" id="query" placeholder="Search the nebula..." onkeypress="if(event.key==='Enter') doSearch()">
    </div>

    <div id="results-list"></div>

    <script>
        // PASTE YOUR API KEY HERE
        const API_KEY = "AIzaSyCVs-1lCznUR0Dujk_IQlaZy2nSpC6lYAI";
        // YOUR CX ID from the script you provided
        const CX_ID = "b41293cb212ad45b3"; 

        async function doSearch() {
            const q = document.getElementById('query').value;
            const list = document.getElementById('results-list');
            if(!q) return;

            list.innerHTML = "<p style='text-align:center; opacity:0.5'>Querying web index...</p>";

            const url = `https://www.googleapis.com/customsearch/v1?key=${API_KEY}&cx=${CX_ID}&q=${encodeURIComponent(q)}`;

            try {
                const response = await fetch(url);
                const data = await response.json();
                list.innerHTML = "";

                if(data.items) {
                    data.items.forEach(res => {
                        const div = document.createElement('div');
                        div.className = 'item';
                        div.innerHTML = `
                            <cite>${res.displayLink}</cite>
                            <a href="${res.link}" target="_blank">${res.title}</a>
                            <p>${res.snippet}</p>
                        `;
                        list.appendChild(div);
                    });
                } else {
                    list.innerHTML = "<p style='text-align:center'>No results found in this sector.</p>";
                }
            } catch (err) {
                list.innerHTML = "<p style='text-align:center; color:red'>Search failed. Check your API quota.</p>";
            }
        }
    </script>
</body>
</html>
