<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Nebula Search</title>
    <style>
        :root { --nebula: #00ffff; --bg: #080808; }
        body { background: var(--bg); color: white; font-family: 'Inter', system-ui, sans-serif; margin: 0; display: flex; flex-direction: column; align-items: center; }
        
        /* Sleek Header */
        .header { margin-top: 100px; text-align: center; transition: 0.5s; }
        .header h1 { font-size: 3.5rem; font-weight: 900; letter-spacing: -3px; margin: 0; }
        .header h1 span { color: var(--nebula); text-shadow: 0 0 20px rgba(0,255,255,0.4); }

        /* Search Bar */
        .search-wrap { width: 90%; max-width: 600px; margin-top: 30px; position: relative; }
        input { 
            width: 100%; padding: 18px 25px; border-radius: 50px; border: 1px solid #222; 
            background: #111; color: white; font-size: 18px; outline: none; transition: 0.3s;
            box-sizing: border-box;
        }
        input:focus { border-color: var(--nebula); box-shadow: 0 0 25px rgba(0,255,255,0.15); }
        
        button { 
            position: absolute; right: 10px; top: 8px; background: var(--nebula); color: black; 
            border: none; padding: 10px 25px; border-radius: 40px; font-weight: 800; cursor: pointer;
        }

        /* Result Area */
        #results { width: 90%; max-width: 750px; margin-top: 50px; padding-bottom: 100px; }
        .res-card { 
            background: #121212; padding: 25px; border-radius: 20px; margin-bottom: 20px; 
            border: 1px solid #1a1a1a; transition: 0.3s;
        }
        .res-card:hover { transform: translateY(-3px); border-color: var(--nebula); background: #151515; }
        .res-card a { color: var(--nebula); font-size: 20px; text-decoration: none; font-weight: bold; }
        .res-card cite { color: #555; display: block; font-size: 13px; margin-bottom: 10px; font-style: normal; }
        .res-card p { color: #aaa; font-size: 15px; line-height: 1.6; margin-top: 10px; }
    </style>
</head>
<body>

    <div class="header" id="neb-header">
        <h1>NEBULA<span>SEARCH</span></h1>
    </div>

    <div class="search-wrap">
        <input type="text" id="neb-input" placeholder="Scan the web..." autocomplete="off">
        <button onclick="launchSearch()">GO</button>
    </div>

    <div id="results"></div>

    <script>
        const API_KEY = "AIzaSyCVs-1lCznUR0Dujk_IQlaZy2nSpC6lYAI";
        const CX_ID = "b41293cb212ad45b3";

        async function launchSearch() {
            const query = document.getElementById('neb-input').value;
            const container = document.getElementById('results');
            if(!query) return;

            // Move header up when searching
            document.getElementById('neb-header').style.marginTop = "40px";
            container.innerHTML = "<p style='text-align:center; opacity:0.3'>Accessing Nebula Web-Index...</p>";

            const url = `https://www.googleapis.com/customsearch/v1?key=${API_KEY}&cx=${CX_ID}&q=${encodeURIComponent(query)}`;

            try {
                const response = await fetch(url);
                const data = await response.json();
                container.innerHTML = "";

                if(data.items) {
                    data.items.forEach(item => {
                        const card = document.createElement('div');
                        card.className = 'res-card';
                        card.innerHTML = `
                            <cite>${item.displayLink}</cite>
                            <a href="${item.link}" target="_blank">${item.title}</a>
                            <p>${item.snippet}</p>
                        `;
                        container.appendChild(card);
                    });
                } else {
                    container.innerHTML = "<p style='text-align:center'>No results. Check 'Search the entire web' setting in Google CSE.</p>";
                }
            } catch (err) {
                container.innerHTML = "<p style='text-align:center; color:red'>System Error: Connection to Google Interrupted.</p>";
            }
        }

        // Search on 'Enter'
        document.getElementById('neb-input').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') launchSearch();
        });
    </script>
</body>
</html>
