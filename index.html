<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Nebula Blox Web</title>
    <script type="importmap">
      {
        "imports": {
          "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
          "@google/generative-ai": "https://esm.run/@google/generative-ai"
        }
      }
    </script>
    <style>
        body { margin: 0; overflow: hidden; font-family: 'Segoe UI', sans-serif; background: #000; }
        #ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; }
        #chat-box { 
            position: absolute; top: 20px; left: 20px; width: 280px; 
            background: rgba(0,0,0,0.7); border-radius: 12px; padding: 15px;
            color: white; pointer-events: auto; backdrop-filter: blur(10px);
            border: 1px solid rgba(0,255,255,0.2);
        }
        #ai-name { color: #00ffff; font-size: 11px; font-weight: 900; margin-bottom: 5px; text-transform: uppercase; }
        #ai-text { font-size: 14px; line-height: 1.4; font-weight: 500; }
        #input-container {
            position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%);
            width: 90%; max-width: 500px; display: flex; gap: 10px; pointer-events: auto;
        }
        input { 
            flex: 1; padding: 15px; border-radius: 30px; border: 1px solid rgba(255,255,255,0.2); 
            background: rgba(255,255,255,0.1); color: white; outline: none; font-size: 16px;
        }
        button { 
            background: #00ffff; border: none; padding: 0 25px; 
            border-radius: 30px; font-weight: bold; cursor: pointer; color: #000;
        }
    </style>
</head>
<body>
    <div id="ui-layer">
        <div id="chat-box">
            <div id="ai-name">GNEBULABLOX AI</div>
            <div id="ai-text">Connected to Vercel. Systems nominal.</div>
        </div>
        <div id="input-container">
            <input type="text" id="user-input" placeholder="Say something to the AI...">
            <button onclick="askAI()">SEND</button>
        </div>
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { GoogleGenerativeAI } from "@google/generative-ai";

        // --- 3D ENGINE ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x111111);
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        const light = new THREE.PointLight(0x00ffff, 2, 50); light.position.set(5, 5, 5); scene.add(light);
        scene.add(new THREE.AmbientLight(0xffffff, 0.5));
        scene.add(new THREE.GridHelper(200, 50, 0x00ffff, 0x222222));

        const char = new THREE.Group();
        const body = new THREE.Mesh(new THREE.BoxGeometry(1, 1.2, 0.6), new THREE.MeshStandardMaterial({ color: 0x0066ff }));
        const head = new THREE.Mesh(new THREE.SphereGeometry(0.45), new THREE.MeshStandardMaterial({ color: 0xffdbac }));
        head.position.y = 1;
        char.add(body, head); char.position.y = 1; scene.add(char);

        camera.position.set(0, 5, 10); camera.lookAt(char.position);

        // --- AI STABLE CONNECTION ---
        const API_KEY = "AIzaSyAgSd5IVtW92TfS3sdb7k8Nc8o362t5a-M";
        const genAI = new GoogleGenerativeAI(API_KEY);

        window.askAI = async () => {
            const input = document.getElementById('user-input');
            const display = document.getElementById('ai-text');
            if (!input.value) return;

            const userPrompt = input.value;
            input.value = "";
            display.innerText = "Processing Nebula data...";

            try {
                // Use the v1 stable model
                const model = genAI.getGenerativeModel({ model: "gemini-1.5-flash" });
                const result = await model.generateContent("You are GNebulaBlox, a robot in a space game. Keep it under 15 words. User: " + userPrompt);
                const response = await result.response;
                display.innerText = response.text();
            } catch (err) {
                console.error(err);
                display.innerText = "Error: Key restricted or expired. Check AI Studio.";
            }
        };

        function animate() {
            requestAnimationFrame(animate);
            char.rotation.y += 0.005; // Make him spin slowly so we know it's not frozen
            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
